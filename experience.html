<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience | Lingkaran Setan</title>
    <link rel="icon" type="image/jpeg" href="favicon-kopi.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.157.0/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="page-experience">
    <div class="page-transition-overlay"></div>
    <div class="scroll-progress-bar" id="scrollProgress"></div>
    <div class="custom-cursor"></div>
    <div class="custom-cursor-glow"></div>

    <nav class="navbar" id="navbar">
        <div class="logo"><a href="/" style="text-decoration:none; color:inherit;">LINGKARAN <span>SETAN</span></a></div>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Explore</a></li>
            <li><a href="/founders">Founders</a></li>
            <li><a href="/experience" class="active">Experience</a></li>
            <li><a href="/connect" class="nav-cta">Kontak</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <section id="experience" class="experience-section fullscreen">
            <div class="section-header exp-header" data-aos="fade-down">
                <div class="label-pill">GALERI</div>
                <h2 class="gradient-text">EXPERIENCE</h2>
                <p>MOMENT OF OUR JOURNEY</p>
            </div>

            <div class="swiper gallerySwiper">
                <div class="swiper-wrapper">
                    <!-- Photo 1 -->
                    <div class="swiper-slide gallery-slide">
                        <img src="gallery-kopi.jpeg" alt="Pengalaman 1">
                        <div class="exp-caption"><span class="exp-num">01</span>Kopi &amp; Cerita</div>
                    </div>
                    <!-- Photo 2 -->
                    <div class="swiper-slide gallery-slide">
                        <img src="gallery-momen.jpeg" alt="Pengalaman 2">
                        <div class="exp-caption"><span class="exp-num">02</span>Momen Bersama</div>
                    </div>
                    <!-- Photo 3 -->
                    <div class="swiper-slide gallery-slide">
                        <img src="gallery-eksplorasi.jpeg" alt="Pengalaman 3">
                        <div class="exp-caption"><span class="exp-num">03</span>Eksplorasi Rasa</div>
                    </div>
                    <!-- Photo 4 -->
                    <div class="swiper-slide gallery-slide">
                        <img src="gallery-setan.jpeg" alt="Pengalaman 4">
                        <div class="exp-caption"><span class="exp-num">04</span>Lingkaran Setan 2K26</div>
                    </div>
                </div>
                <div class="swiper-pagination gallery-pagination"></div>
                <div class="swiper-button-next gallery-next"></div>
                <div class="swiper-button-prev gallery-prev"></div>
            </div>

            <footer class="footer">
                <div class="footer-inner">
                    <div class="footer-logo">LINGKARAN <span>SETAN</span></div>
                    <p class="footer-copy">© 2026 Lingkaran Setan. All rights reserved.</p>
                </div>
            </footer>
        </section>
    </div>

    <!-- Persistent Music -->
    <audio id="bgMusic" loop><source src="hindia-kita-ke-sana.mp3" type="audio/mpeg"></audio>
    <button class="music-fab" id="musicToggle">
        <div class="eq-bars">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </div>
    </button>
    <button class="back-to-top" id="backToTop"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
