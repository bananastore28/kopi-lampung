<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | Lingkaran Setan</title>
    <link rel="icon" type="image/jpeg" href="favicon-kopi.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --amber: #C96614; --neon: #EAA156; --bg: #060403; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(201,102,20,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,102,20,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0; pointer-events: none;
        }
        /* TOPBAR */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(6,4,3,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,102,20,0.15);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 100;
        }
        .topbar-logo { font-size: 13px; font-weight: 800; letter-spacing: 2px; }
        .topbar-logo span { color: var(--neon); }
        .topbar-right { display: flex; align-items: center; gap: 20px; }
        .admin-badge {
            font-size: 0.65rem; letter-spacing: 2px; color: var(--neon);
            background: rgba(234,161,86,0.1); padding: 6px 14px;
            border-radius: 50px; border: 1px solid rgba(234,161,86,0.2);
        }
        .btn-logout {
            font-size: 0.65rem; letter-spacing: 2px; color: rgba(255,255,255,0.4);
            background: none; border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 14px; border-radius: 50px; cursor: pointer;
            transition: 0.3s; font-family: inherit;
        }
        .btn-logout:hover { border-color: rgba(255,80,80,0.5); color: #ff8080; }
        /* MAIN LAYOUT */
        .main {
            padding: 90px 40px 40px;
            max-width: 1100px; margin: 0 auto; position: relative; z-index: 1;
        }
        /* STATS ROW */
        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; padding: 28px;
        }
        .stat-label { font-size: 0.6rem; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 10px; }
        .stat-value { font-size: 2.4rem; font-weight: 700; color: var(--neon); }
        /* MESSAGES SECTION */
        .section-title {
            font-size: 0.65rem; letter-spacing: 4px; color: rgba(255,255,255,0.3);
            text-transform: uppercase; margin-bottom: 20px; display: flex;
            align-items: center; gap: 12px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
        .messages-grid { display: flex; flex-direction: column; gap: 12px; }
        .msg-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 20px 24px;
            display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
            transition: 0.3s; animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .msg-card:hover { border-color: rgba(201,102,20,0.2); background: rgba(201,102,20,0.03); }
        .msg-content { flex: 1; }
        .msg-nama { font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; }
        .msg-pesan { font-size: 0.85rem; color: rgba(255,255,255,0.55); line-height: 1.6; }
        .msg-time { font-size: 0.65rem; letter-spacing: 1px; color: rgba(255,255,255,0.2); margin-top: 8px; }
        .btn-delete {
            background: rgba(255,50,50,0.08); border: 1px solid rgba(255,50,50,0.2);
            color: rgba(255,100,100,0.7); padding: 8px 14px; border-radius: 8px;
            cursor: pointer; font-size: 0.7rem; letter-spacing: 1px;
            font-family: inherit; transition: 0.3s; white-space: nowrap;
        }
        .btn-delete:hover { background: rgba(255,50,50,0.2); color: #ff6060; }
        .empty-state {
            text-align: center; padding: 60px; color: rgba(255,255,255,0.2);
            font-size: 0.85rem; letter-spacing: 2px;
        }
        .refresh-btn {
            background: none; border: 1px solid rgba(201,102,20,0.3);
            color: var(--neon); padding: 8px 18px; border-radius: 50px;
            cursor: pointer; font-family: inherit; font-size: 0.7rem; letter-spacing: 2px;
            transition: 0.3s; margin-bottom: 20px;
        }
        .refresh-btn:hover { background: rgba(201,102,20,0.1); }
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(30,30,30,0.95); border: 1px solid rgba(201,102,20,0.3);
            border-radius: 12px; padding: 14px 20px; font-size: 0.85rem;
            color: var(--neon); z-index: 9999; transform: translateY(100px);
            transition: 0.4s; opacity: 0;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-logo">LINGKARAN <span>SETAN</span></div>
        <div class="topbar-right">
            <div class="admin-badge" id="adminBadge">ADMIN</div>
            <button class="btn-logout" id="logoutBtn">LOGOUT</button>
        </div>
    </div>

    <div class="main">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Pesan Masuk</div>
                <div class="stat-value" id="totalMessages">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pesan Terbaru</div>
                <div class="stat-value" id="latestSender" style="font-size:1.1rem; padding-top:8px;">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Status Server</div>
                <div class="stat-value" style="font-size:1.4rem; color:#4ec94e;">● ONLINE</div>
            </div>
        </div>

        <div class="section-title">Kotak Masuk Pesan Pengunjung</div>
        <button class="refresh-btn" onclick="loadMessages()">⟳ REFRESH</button>
        <div class="messages-grid" id="messagesGrid">
            <div class="empty-state">Memuat data...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function formatDate(str) {
            const d = new Date(str);
            return d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        async function loadMessages() {
            try {
                const res = await fetch('/api/admin/messages');
                if (res.status === 401) { window.location.href = '/login'; return; }
                const data = await res.json();
                const grid = document.getElementById('messagesGrid');
                const messages = data.messages || [];

                document.getElementById('totalMessages').textContent = messages.length;
                document.getElementById('latestSender').textContent = messages.length > 0 ? messages[0].nama : '-';

                if (messages.length === 0) {
                    grid.innerHTML = '<div class="empty-state">BELUM ADA PESAN MASUK.</div>';
                    return;
                }

                grid.innerHTML = messages.map(m => `
                    <div class="msg-card" id="msg-${m.id}">
                        <div class="msg-content">
                            <div class="msg-nama">${escapeHtml(m.nama)}</div>
                            <div class="msg-pesan">${escapeHtml(m.pesan)}</div>
                            <div class="msg-time">${formatDate(m.created_at)}</div>
                        </div>
                        <button class="btn-delete" onclick="deleteMessage(${m.id})">HAPUS</button>
                    </div>
                `).join('');
            } catch {
                document.getElementById('messagesGrid').innerHTML =
                    '<div class="empty-state">Gagal memuat. Pastikan server berjalan.</div>';
            }
        }

        async function deleteMessage(id) {
            if (!confirm('Hapus pesan ini secara permanen?')) return;
            try {
                const res = await fetch(`/api/admin/messages/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById(`msg-${id}`)?.remove();
                    showToast('✓ Pesan berhasil dihapus.');
                    const remaining = document.querySelectorAll('.msg-card').length;
                    document.getElementById('totalMessages').textContent = remaining;
                } else {
                    showToast(data.error || 'Gagal menghapus.');
                }
            } catch { showToast('Koneksi error.'); }
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/admin/logout', { method: 'POST' });
            window.location.href = '/login';
        });

        // Cek auth & load saat halaman dibuka
        fetch('/api/admin/status').then(r => {
            if (!r.ok) window.location.href = '/login';
            else return r.json();
        }).then(data => {
            if (data) document.getElementById('adminBadge').textContent = data.username.toUpperCase();
        }).catch(() => window.location.href = '/login');

        loadMessages();
        // Auto-refresh tiap 30 detik
        setInterval(loadMessages, 30000);
    </script>
</body>
</html>
